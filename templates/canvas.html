<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Guide Canvas</title>
    <script type="module" src="https://unpkg.com/@excalidraw/excalidraw@0.18.0/dist/excalidraw.production.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
        }
        #canvas-app {
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>
    <div id="canvas-app"></div>
    <script>
        const container = document.getElementById("canvas-app");
        const excalidraw = Excalidraw.create(container, {
            initialData: {
                appState: { viewBackgroundColor: "#020617" },
                elements: [
                    { type: "text", x: 200, y: 200, width: 600, text: "AI Tax Guide Friend", 
                      fontSize: 32, strokeColor: "#22d3ee", font: "Virgil" },
                    { type: "text", x: 200, y: 250, width: 600, text: "Click to begin your guided tax session.", 
                      fontSize: 18, strokeColor: "#94a3b8", font: "Virgil" }
                ]
            }
        });
    </script>
</body>
</html>
