<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIFM Tax Guide</title>
    <script type="module" src="https://unpkg.com/@excalidraw/excalidraw@0.18.0/dist/excalidraw.production.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: #020617;
            overflow: hidden;
        }
        #canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <script>
        const container = document.getElementById('canvas');
        Excalidraw.create(container, {
            initialData: {
                appState: { viewBackgroundColor: '#020617' },
                elements: [
                    { type: "text", x: 200, y: 200, width: 600, text: "AI Tax Guide Friend", fontSize: 32, 
                      strokeColor: "#22d3ee", font: "Virgil" },
                    { type: "text", x: 200, y: 260, width: 600, text: "Your smart path through tax season. Click below to start.", 
                      fontSize: 18, strokeColor: "#94a3b8", font: "Virgil" }
                ]
            }
        });
    </script>
</body>
</html>
